name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12", "3.13", "3.14"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"
          cache-dependency-path: pyproject.toml
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Guard - kiwipiepy importable (없으면 테스트 대부분이 무음 스킵됨)
        run: python -c "import kiwipiepy; print('kiwipiepy', kiwipiepy.__version__)"
      - name: Lint
        run: ruff check src tests
      - name: Test
        run: pytest -q -rs
